<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#04060d" />
    <meta name="color-scheme" content="dark" />
    <meta
      name="description"
      content="Roadmind — Local AI Technical Roadmap Generator. Turn project ideas into structured, schema-validated roadmaps using your local Ollama model."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2338bdf8'/%3E%3Cstop offset='50%25' stop-color='%23818cf8'/%3E%3Cstop offset='100%25' stop-color='%23c084fc'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='2' y='2' width='44' height='44' rx='12' fill='%23050816'/%3E%3Crect x='2' y='2' width='44' height='44' rx='12' fill='none' stroke='url(%23g)' stroke-width='1.5'/%3E%3Cpath d='M10 32 C 10 18, 18 14, 24 24 C 30 14, 38 18, 38 32' fill='none' stroke='url(%23g)' stroke-width='2.4' stroke-linecap='round'/%3E%3Cpath d='M24 24 L24 40' stroke='url(%23g)' stroke-width='2.2' stroke-linecap='round' stroke-dasharray='2 3'/%3E%3Ccircle cx='10' cy='32' r='2.1' fill='%23f0f9ff'/%3E%3Ccircle cx='38' cy='32' r='2.1' fill='%23f0f9ff'/%3E%3Ccircle cx='24' cy='24' r='2.8' fill='%23f0f9ff'/%3E%3Ccircle cx='24' cy='40' r='1.9' fill='%23f0f9ff'/%3E%3C/svg%3E"
    />
    <title>Roadmind — Local AI Technical Roadmap Generator</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: #04060d;
        color: #e2e8f0;
        font-family: "Inter", system-ui, sans-serif;
      }

      /* ================================================
         Boot splash — first paint, before React mounts
         ================================================ */
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: radial-gradient(
            ellipse at top,
            rgba(56, 189, 248, 0.08),
            transparent 60%
          ),
          radial-gradient(
            ellipse at bottom right,
            rgba(168, 85, 247, 0.08),
            transparent 60%
          ),
          #04060d;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        pointer-events: none;
        animation: boot-out 0.6s 1.7s forwards cubic-bezier(0.4, 0, 0.2, 1);
      }

      #boot-splash .boot-orb {
        position: absolute;
        width: 60vmin;
        height: 60vmin;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          #38bdf8,
          #818cf8,
          #c084fc,
          #ec4899,
          #38bdf8
        );
        filter: blur(90px);
        opacity: 0.32;
        animation: boot-orb-spin 14s linear infinite;
      }

      #boot-splash .boot-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(148, 163, 184, 0.07) 1px, transparent 1px),
          linear-gradient(90deg, rgba(148, 163, 184, 0.07) 1px, transparent 1px);
        background-size: 44px 44px;
        -webkit-mask: radial-gradient(
          ellipse at center,
          #000 30%,
          transparent 70%
        );
        mask: radial-gradient(ellipse at center, #000 30%, transparent 70%);
      }

      #boot-splash .boot-content {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      #boot-splash .boot-logo {
        filter: drop-shadow(0 14px 40px rgba(56, 189, 248, 0.55));
      }

      #boot-splash .bs-frame-fill {
        fill: url(#bs-grad);
        opacity: 0;
        animation: boot-fade 0.5s 0.05s forwards;
      }

      #boot-splash .bs-frame {
        fill: none;
        stroke: url(#bs-grad);
        stroke-width: 1.3;
        stroke-dasharray: 200;
        stroke-dashoffset: 200;
        opacity: 0.85;
        animation: boot-trace 0.7s 0.05s forwards
          cubic-bezier(0.4, 0, 0.2, 1);
      }

      #boot-splash .bs-arc {
        fill: none;
        stroke: url(#bs-grad);
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-dasharray: 70;
        stroke-dashoffset: 70;
        animation: boot-trace 0.85s 0.45s forwards
          cubic-bezier(0.4, 0, 0.2, 1);
      }

      #boot-splash .bs-road {
        stroke: url(#bs-grad);
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-dasharray: 2 3;
        opacity: 0;
        animation: boot-fade 0.35s 1.05s forwards;
      }

      #boot-splash .bs-node {
        fill: #f0f9ff;
        transform-origin: center;
        transform-box: fill-box;
        opacity: 0;
      }
      #boot-splash .bs-node-center {
        animation: boot-pop 0.55s 0.95s both
          cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      #boot-splash .bs-node-center-ring {
        fill: none;
        stroke: url(#bs-grad);
        stroke-width: 1;
        opacity: 0;
        transform-origin: 24px 24px;
        animation: boot-ring 1.2s 1.1s forwards;
      }
      #boot-splash .bs-node-l {
        animation: boot-pop 0.45s 1.18s both
          cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      #boot-splash .bs-node-r {
        animation: boot-pop 0.45s 1.26s both
          cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      #boot-splash .bs-node-bot {
        animation: boot-pop 0.45s 1.4s both
          cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      #boot-splash .boot-wordmark {
        font-family: "Space Grotesk", "Inter", system-ui, sans-serif;
        font-size: 30px;
        font-weight: 700;
        letter-spacing: -0.025em;
        color: #ffffff;
        opacity: 0;
        animation: boot-rise 0.6s 1s forwards
          cubic-bezier(0.2, 0.8, 0.3, 1);
      }
      #boot-splash .boot-wordmark .dot {
        color: #38bdf8;
      }

      #boot-splash .boot-tagline {
        font-family: "Inter", system-ui, sans-serif;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: #64748b;
        opacity: 0;
        animation: boot-rise 0.6s 1.18s forwards
          cubic-bezier(0.2, 0.8, 0.3, 1);
      }

      #boot-splash .boot-progress {
        margin-top: 4px;
        width: 140px;
        height: 2px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 999px;
        overflow: hidden;
        opacity: 0;
        animation: boot-fade 0.4s 0.35s forwards;
      }
      #boot-splash .boot-progress span {
        display: block;
        height: 100%;
        width: 0%;
        background: linear-gradient(
          90deg,
          #38bdf8,
          #818cf8,
          #c084fc
        );
        box-shadow: 0 0 12px rgba(56, 189, 248, 0.7);
        animation: boot-progress 1.55s 0.05s forwards
          cubic-bezier(0.2, 0.8, 0.3, 1);
      }

      #boot-splash .boot-corners {
        position: absolute;
        inset: 24px;
        pointer-events: none;
      }
      #boot-splash .boot-corners::before,
      #boot-splash .boot-corners::after,
      #boot-splash .boot-corners > span {
        content: "";
        position: absolute;
        width: 18px;
        height: 18px;
        border: 1px solid rgba(56, 189, 248, 0.55);
        opacity: 0;
        animation: boot-fade 0.5s 1.45s forwards;
      }
      #boot-splash .boot-corners::before {
        top: 0;
        left: 0;
        border-right: none;
        border-bottom: none;
      }
      #boot-splash .boot-corners::after {
        bottom: 0;
        right: 0;
        border-left: none;
        border-top: none;
      }
      #boot-splash .boot-corners > span:nth-child(1) {
        top: 0;
        right: 0;
        border-left: none;
        border-bottom: none;
      }
      #boot-splash .boot-corners > span:nth-child(2) {
        bottom: 0;
        left: 0;
        border-right: none;
        border-top: none;
      }

      @keyframes boot-orb-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes boot-trace {
        to {
          stroke-dashoffset: 0;
        }
      }
      @keyframes boot-fade {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes boot-rise {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes boot-pop {
        0% {
          opacity: 0;
          transform: scale(0);
        }
        60% {
          opacity: 1;
          transform: scale(1.45);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes boot-ring {
        0% {
          opacity: 0;
          transform: scale(0.4);
        }
        40% {
          opacity: 0.85;
        }
        100% {
          opacity: 0;
          transform: scale(2.4);
        }
      }
      @keyframes boot-progress {
        to {
          width: 100%;
        }
      }
      @keyframes boot-out {
        to {
          opacity: 0;
          visibility: hidden;
          transform: scale(1.04);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #boot-splash {
          animation: boot-out 0.001s 0.05s forwards;
        }
        #boot-splash * {
          animation: none !important;
          opacity: 1 !important;
        }
      }
    </style>
  </head>
  <body class="bg-[#04060d] text-slate-100 antialiased">
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-orb"></div>
      <div class="boot-grid"></div>
      <div class="boot-corners">
        <span></span>
        <span></span>
      </div>
      <div class="boot-content">
        <svg
          class="boot-logo"
          viewBox="0 0 48 48"
          width="92"
          height="92"
          aria-hidden="true"
        >
          <defs>
            <linearGradient
              id="bs-grad"
              x1="0%"
              y1="0%"
              x2="100%"
              y2="100%"
            >
              <stop offset="0%" stop-color="#38bdf8" />
              <stop offset="50%" stop-color="#818cf8" />
              <stop offset="100%" stop-color="#c084fc" />
            </linearGradient>
          </defs>
          <rect
            class="bs-frame-fill"
            x="2"
            y="2"
            width="44"
            height="44"
            rx="12"
          />
          <rect
            class="bs-frame"
            x="2"
            y="2"
            width="44"
            height="44"
            rx="12"
          />
          <path
            class="bs-arc"
            d="M10 32 C 10 18, 18 14, 24 24 C 30 14, 38 18, 38 32"
          />
          <path class="bs-road" d="M24 24 L24 40" />
          <circle
            class="bs-node-center-ring"
            cx="24"
            cy="24"
            r="3.5"
          />
          <circle
            class="bs-node bs-node-center"
            cx="24"
            cy="24"
            r="3"
          />
          <circle
            class="bs-node bs-node-l"
            cx="10"
            cy="32"
            r="2.1"
          />
          <circle
            class="bs-node bs-node-r"
            cx="38"
            cy="32"
            r="2.1"
          />
          <circle
            class="bs-node bs-node-bot"
            cx="24"
            cy="40"
            r="1.9"
          />
        </svg>
        <div class="boot-wordmark">
          Roadmind<span class="dot">.</span>
        </div>
        <div class="boot-tagline">Local AI · Technical Roadmaps</div>
        <div class="boot-progress"><span></span></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
